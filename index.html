<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktikum 6</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>
<body>
    <div class="header">
        <h1>Praktikum 6</h1>
    </div>
    <div class="video" id="videoFrame">
        <h3>🎵 VIDEO PRAKTIKUM 6 🎵</h3>
<iframe width="560" height="315" src="https://www.youtube.com/embed/g_Y9ZV-y3bM?si=zJ_YOVUyb1udqK_0&amp;start=2" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>    </div>

    <div class="audio-section">
        <h2>🎶 AUDIO KEREN 🎶</h2>
        <div class="audio-player">
            <audio controls>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                Browser Anda tidak support audio
            </audio>
        </div>
    </div>

    <div class="photo-section">
        <h2>📸 GALERI FOTO ISTIMEWA 📸</h2>
        <div class="photo-gallery" id="fotoFrame">
            <div class="photo-frame">
                <img src="https://apps.codepolitan.com/sites/learn/uploads/original/202308/mainconnection.png" alt="Foto 1" class="photo"/>
                <p class="photo-label">FOTO PERTAMA 🌟</p>
            </div>
            <div class="photo-frame">
                <img src="https://europe1.discourse-cdn.com/flex013/uploads/graviteeforum/original/1X/33c2fb1d3418521f02f78030f38bc4e6e6a79b61.jpeg" alt="Foto 2" class="photo"/>
                <p class="photo-label">FOTO KEDUA ✨</p>
            </div>
        </div>
    </div>
</body>
</html>
